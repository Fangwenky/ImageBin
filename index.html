<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🖼️ ImageBin - 图床工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            color: #f1f5f9;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        
        h1 {
            font-size: 2rem;
            text-align: center;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .subtitle { text-align: center; color: #94a3b8; margin-bottom: 30px; }
        
        /* Upload Area */
        .upload-area {
            border: 3px dashed #334155;
            border-radius: 16px;
            padding: 50px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 30px;
            background: #1e293b;
        }
        .upload-area:hover, .upload-area.dragover {
            border-color: #6366f1;
            background: rgba(99, 102, 241, 0.1);
        }
        .upload-icon { font-size: 4rem; margin-bottom: 15px; }
        .upload-area h3 { margin-bottom: 10px; }
        .upload-area p { color: #94a3b8; }
        
        /* Preview */
        .preview-card {
            background: #1e293b;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            display: none;
        }
        .preview-card.show { display: block; }
        .preview-img {
            max-width: 100%;
            max-height: 400px;
            border-radius: 12px;
            margin-bottom: 15px;
        }
        
        /* Links */
        .link-group {
            background: #0f172a;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        .link-label {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 8px;
        }
        .link-input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #1e293b;
            color: #f1f5f9;
            font-family: monospace;
        }
        .copy-btn {
            background: #6366f1;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 8px;
        }
        .copy-btn:hover { background: #4f46e5; }
        
        /* History */
        .history {
            margin-top: 30px;
        }
        .history h3 { margin-bottom: 15px; }
        .history-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }
        .history-item {
            background: #1e293b;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .history-item:hover { transform: scale(1.05); }
        .history-item img {
            width: 100%;
            height: 120px;
            object-fit: cover;
        }
        .history-item .name {
            padding: 8px;
            font-size: 0.8rem;
            color: #94a3b8;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #22c55e;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            display: none;
            z-index: 1000;
        }
        .toast.show { display: block; }
        
        /* Loading */
        .loading {
            display: none;
            text-align: center;
            padding: 30px;
        }
        .loading.show { display: block; }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #334155;
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Config */
        .config {
            background: #1e293b;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .config input {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: #f1f5f9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖼️ ImageBin</h1>
        <p class="subtitle">简单好用的图床工具</p>
        
        <!-- Config -->
        <div class="config">
            <input type="text" id="apiUrl" placeholder="API 地址 (可选，默认使用内置上传)" value="">
        </div>
        
        <!-- Upload -->
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <h3>点击或拖拽图片到这里</h3>
            <p>支持 PNG, JPG, GIF, WebP</p>
            <input type="file" id="fileInput" accept="image/*" style="display: none;">
        </div>
        
        <!-- Loading -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 15px;">上传中...</p>
        </div>
        
        <!-- Preview -->
        <div class="preview-card" id="previewCard">
            <img id="previewImg" class="preview-img" src="" alt="Preview">
            
            <div class="link-group">
                <div class="link-label">📎 Markdown</div>
                <input type="text" class="link-input" id="markdownLink" readonly>
                <button class="copy-btn" onclick="copyLink('markdownLink')">复制</button>
            </div>
            
            <div class="link-group">
                <div class="link-label">🔗 HTML</div>
                <input type="text" class="link-input" id="htmlLink" readonly>
                <button class="copy-btn" onclick="copyLink('htmlLink')">复制</button>
            </div>
            
            <div class="link-group">
                <div class="link-label">� raw 地址</div>
                <input type="text" class="link-input" id="rawLink" readonly>
                <button class="copy-btn" onclick="copyLink('rawLink')">复制</button>
            </div>
        </div>
        
        <!-- History -->
        <div class="history">
            <h3>📚 最近上传</h3>
            <div class="history-grid" id="historyGrid"></div>
        </div>
    </div>
    
    <div class="toast" id="toast">已复制到剪贴板！</div>

    <script>
        const API_URL = localStorage.getItem('imagebin_api') || '';
        
        // DOM elements
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const loading = document.getElementById('loading');
        const previewCard = document.getElementById('previewCard');
        
        // Upload handlers
        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files[0]) uploadFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) uploadFile(e.target.files[0]);
        });
        
        // Upload function
        async function uploadFile(file) {
            if (!file.type.startsWith('image/')) {
                alert('请上传图片文件');
                return;
            }
            
            // Show loading
            loading.classList.add('show');
            previewCard.classList.remove('show');
            
            // Create preview
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('previewImg').src = e.target.result;
            };
            reader.readAsDataURL(file);
            
            try {
                let imageUrl;
                
                if (API_URL) {
                    // Use custom API
                    const formData = new FormData();
                    formData.append('image', file);
                    
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        body: formData
                    });
                    const data = await response.json();
                    imageUrl = data.url || data.link;
                } else {
                    // Use Catbox.moe (free, works!)
                    const formData = new FormData();
                    formData.append('image', file);
                    
                    imageUrl = await uploadToImgbb(formData) || await uploadToLitter(formData);
                }
                
                if (!imageUrl) {
                    throw new Error('上传失败');
                }
                
                // Show result
                document.getElementById('markdownLink').value = `![${file.name}](${imageUrl})`;
                document.getElementById('htmlLink').value = `<img src="${imageUrl}" alt="${file.name}">`;
                document.getElementById('rawLink').value = imageUrl;
                
                previewCard.classList.add('show');
                loading.classList.remove('show');
                
                // Save to history
                saveToHistory(file.name, imageUrl);
                
            } catch (error) {
                alert('上传失败: ' + error.message);
                loading.classList.remove('show');
            }
        }
        
        // Upload to Catbox.moe (free, works!)
        async function uploadToImgbb(formData) {
            try {
                // Convert to base64 for catbox
                const fileInput = formData.get('image');
                const reader = new FileReader();
                return new Promise((resolve) => {
                    reader.onload = async () => {
                        const base64 = reader.result.split(',')[1];
                        try {
                            const response = await fetch('https://catbox.moe/user/api.php', {
                                method: 'POST',
                                body: 'reqtype=fileupload&fileToUpload=' + encodeURIComponent(base64)
                            });
                            const text = await response.text();
                            if (text.startsWith('https://')) {
                                resolve(text.trim());
                            } else {
                                resolve(null);
                            }
                        } catch { resolve(null); }
                    };
                    reader.readAsDataURL(fileInput);
                });
            } catch {
                return null;
            }
        }
        
        // Upload to 0x0.st
        async function uploadToLitter(formData) {
            try {
                const response = await fetch('https://0x0.st', {
                    method: 'POST',
                    body: formData
                });
                const text = await response.text();
                if (text.startsWith('https://')) {
                    return text.trim();
                }
                return null;
            } catch {
                return null;
            }
        }
        
        // Copy link
        function copyLink(id) {
            const input = document.getElementById(id);
            input.select();
            document.execCommand('copy');
            
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
        
        // History
        function saveToHistory(name, url) {
            let history = JSON.parse(localStorage.getItem('imagebin_history') || '[]');
            history.unshift({ name, url, time: Date.now() });
            history = history.slice(0, 20); // Keep last 20
            localStorage.setItem('imagebin_history', JSON.stringify(history));
            renderHistory();
        }
        
        function renderHistory() {
            const history = JSON.parse(localStorage.getItem('imagebin_history') || '[]');
            const grid = document.getElementById('historyGrid');
            
            if (history.length === 0) {
                grid.innerHTML = '<p style="color: #94a3b8;">暂无记录</p>';
                return;
            }
            
            grid.innerHTML = history.map(item => `
                <div class="history-item" onclick="copyLinkFromHistory('${item.url}')">
                    <img src="${item.url}" alt="${item.name}">
                    <div class="name">${item.name}</div>
                </div>
            `).join('');
        }
        
        function copyLinkFromHistory(url) {
            navigator.clipboard.writeText(url);
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
        
        // Init
        renderHistory();
    </script>
</body>
</html>
